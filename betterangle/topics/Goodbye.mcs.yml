mcs.metadata:
  componentName: Wiedersehen
  description: Dieses Thema wird ausgelöst, wenn der Benutzer die Unterhaltung beenden möchte. Standardmäßig wird die Unterhaltung nicht beendet. Wenn Sie die Unterhaltung beenden möchten, wenn sich der Benutzer verabschiedet, können Sie diesem Thema eine Aktion „Ende der Unterhaltung“ hinzufügen oder zum Systemthema „Ende der Unterhaltung“ umleiten.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Wiedersehen
    includeInOnSelectIntent: false
    triggerQueries:
      - Wiedersehen
      - Wiederhören
      - Bis bald
      - Bis dann
      - Auf Wiedersehen
      - Auf Wiederhören
      - Nein, danke. Auf Wiedersehen.
      - Nein, danke. Auf Wiederhören.
      - Bis später

  actions:
    - kind: Question
      id: question_zf2HhP
      variable: Topic.EndConversation
      prompt: Möchten Sie unsere Unterhaltung beenden?
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: condition_DGc1Wy
      conditions:
        - id: condition_DGc1Wy-item-0
          condition: =Topic.EndConversation = true
          actions:
            - kind: BeginDialog
              id: dn94DC
              dialog: cr91b_betterangle.topic.EndofConversation

        - id: condition_DGc1Wy-item-1
          condition: =Topic.EndConversation = false
          actions:
            - kind: SendActivity
              id: sendMessage_LdLhmf
              activity: Fahren Sie fort, ich höre zu.