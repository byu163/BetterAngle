mcs.metadata:
  componentName: Fallback
  description: Dieses Systemthema wird ausgelöst, wenn die Äußerung des Benutzers mit keinem vorhandenen Thema übereinstimmt.
kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  actions:
    - kind: ConditionGroup
      id: conditionGroup_LktzXw
      conditions:
        - id: conditionItem_tlGIVo
          condition: =System.FallbackCount < 3
          actions:
            - kind: SendActivity
              id: sendMessage_QZreqo
              activity: Leider bin ich nicht sicher, wie ich dabei helfen kann. Können Sie bitte umformulieren?

      elseActions:
        - kind: BeginDialog
          id: 5aXj5M
          dialog: cr91b_betterangle.topic.Escalate