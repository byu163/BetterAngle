name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build BetterAngle
      run: |
        if (Test-Path bin) { Remove-Item -Recycle -Force bin }
        mkdir bin
        
        # Build Main App
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /Iinclude /Isrc src/main_app/BetterAngle.cpp src/shared/*.cpp /Fe:bin/BetterAngle.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib /SUBSYSTEM:WINDOWS
        
        # Build Config Tool
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /Iinclude /Isrc src/config_tool/BetterAngleConfig.cpp src/shared/*.cpp /Fe:bin/BetterAngleConfig.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib /SUBSYSTEM:WINDOWS

        # Bundle everything
        Compress-Archive -Path bin/*.exe, profiles -DestinationPath bin/BetterAngle_Pro.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/BetterAngle_Pro.zip
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v3.5.${{ github.run_number }}
        name: BetterAngle Pro v3.5.0.${{ github.run_number }}
        body: |
            BetterAngle v3.5 Pro Edition (Auto-Build)
            - Improved: Build flag parsing fixed
            - New: Every push now creates a unique version release
            - Feature: Smart Detach Tracking & Dual FOV Monitoring
            - Feature: MahanYTT Config Tool included
