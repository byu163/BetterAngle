name: MSBuild

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build BetterAngle
        shell: cmd
        run: |
          if exist BetterAngle.sln (
            msbuild BetterAngle.sln /p:Configuration=Release /p:Platform=x64
          ) else (
            echo No solution file found, skipping solution build.
          )

      - name: Build uninstaller.exe
        shell: cmd
        run: |
          cl /std:c++20 /EHsc /O2 /W4 /Fe:uninstaller.exe uninstall.cpp ole32.lib shell32.lib

      - name: Upload uninstaller artifact
        uses: actions/upload-artifact@v4
        with:
          name: uninstaller
          path: uninstaller.exe