name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build BetterAngle
      run: |
        if (Test-Path bin) { Remove-Item -Recycle -Force bin }
        mkdir bin
        $FLAGS = "/EHsc /O2 /DUNICODE /D_UNICODE /I include /I src"
        $LIBS = "user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib /SUBSYSTEM:WINDOWS"
        
        # Build Main App
        cl.exe $FLAGS src/main_app/BetterAngle.cpp src/shared/*.cpp /Fe:bin/BetterAngle.exe /link $LIBS
        
        # Build Config Tool
        cl.exe $FLAGS src/config_tool/BetterAngleConfig.cpp src/shared/*.cpp /Fe:bin/BetterAngleConfig.exe /link $LIBS

        # Bundle everything
        Compress-Archive -Path bin/*.exe, profiles -DestinationPath bin/BetterAngle_Pro.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: bin/BetterAngle_Pro.zip
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
            BetterAngle v3.5 Pro Edition
            - Modern "Glass" UI HUD
            - Smart Detach Tracking (No more menu drift!)
            - Dual FOV Switching (Normal/Diving)
            - Separate Config Tool for MahanYTT to create profiles
            - Automated GitHub Releases
