name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build BetterAngle
        run: |
          $ver = (Get-Content VERSION).Trim()
          
          # 1. Ensure the output directory exists
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          
          # 2. Run the build (using your working version logic)
          $versionDef = "/DAPP_VERSION=$ver"
          
          cl.exe /EHsc /O2 /DUNICODE /D_UNICODE $versionDef /Iinclude /Isrc src/main_app/BetterAngle.cpp src/main_app/ThresholdWizard.cpp src/shared/*.cpp /Fe:bin/BetterAngle.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib shell32.lib d2d1.lib dwrite.lib windowscodecs.lib /SUBSYSTEM:WINDOWS
      - name: Get Version
        id: get_version
        run: |
          $ver = (Get-Content VERSION).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "TAG=v$ver" >> $env:GITHUB_ENV

      - name: Extract Latest Release Notes
        run: |
          $lines = Get-Content RELEASE_NOTES.md
          $outLines = @()
          $seenFirst = $false
          foreach ($line in $lines) {
              if ($line.StartsWith("### ")) {
                  if ($seenFirst) { break }
                  $seenFirst = $true
              }
              if ($seenFirst) { $outLines += $line }
          }
          $outLines | Out-File CURRENT_RELEASE_NOTES.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/BetterAngle.exe
          tag_name: ${{ env.TAG }}
          name: BetterAngle Pro ${{ env.TAG }}
          body_path: CURRENT_RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
