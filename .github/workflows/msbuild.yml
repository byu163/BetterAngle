name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build BetterAngle
        run: |
          $ver = (Get-Content VERSION).Trim()
          
          # 1. Ensure the output directory exists
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          
          # 2. Run the build (using your working version logic)
          $versionDef = "/DAPP_VERSION=$ver"
          
          cl.exe /EHsc /O2 /DUNICODE /D_UNICODE $versionDef /Iinclude /Isrc src/main_app/BetterAngle.cpp src/shared/*.cpp /Fe:bin/BetterAngle.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib shell32.lib d2d1.lib dwrite.lib windowscodecs.lib /SUBSYSTEM:WINDOWS
          
          cl.exe /EHsc /O2 /DUNICODE /D_UNICODE $versionDef /Iinclude /Isrc src/config_tool/BetterAngleConfig.cpp src/shared/Input.cpp src/shared/Profile.cpp src/shared/State.cpp src/shared/Logic.cpp /Fe:bin/BetterAngleConfig.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib shell32.lib d2d1.lib dwrite.lib windowscodecs.lib /SUBSYSTEM:WINDOWS
      - name: Get Version
        id: get_version
        run: |
          $ver = (Get-Content VERSION).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "TAG=v$ver" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/BetterAngle.exe
            bin/BetterAngleConfig.exe
          tag_name: ${{ env.TAG }}
          name: BetterAngle Pro ${{ env.TAG }}
          body: |
            ### BetterAngle Pro Flagship Update
            - v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
